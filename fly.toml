# fly.toml app configuration file generated for maraithon on 2026-03-08T22:56:55-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'maraithon'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[env]
  PHX_HOST = 'maraithon.fly.dev'
  PHX_SERVER = 'true'
  PORT = '8080'
  ECTO_IPV6 = 'true'
  DNS_CLUSTER_QUERY = 'maraithon.internal'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
